name: ReleaseX
description: Automated release tool for Python, Rust, and Go projects — version bumps, changelogs, release PRs, and PyPI publishing.
author: iamgp

branding:
  icon: package
  color: blue

inputs:
  command:
    description: Command to run, for example `release pr` or `release tag`.
    required: true
  version:
    description: Release tag to download, or `latest`.
    required: false
    default: latest
  args:
    description: Additional flags to pass (e.g. `--dry-run`).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Detect platform
      id: platform
      shell: bash
      run: |
        case "$RUNNER_OS-$RUNNER_ARCH" in
          Linux-X64)   target="x86_64-unknown-linux-musl" ;;
          Linux-ARM64) target="aarch64-unknown-linux-gnu" ;;
          macOS-X64)   target="x86_64-apple-darwin" ;;
          macOS-ARM64) target="aarch64-apple-darwin" ;;
          Windows-X64) target="x86_64-pc-windows-msvc" ;;
          *) echo "::error::Unsupported platform: $RUNNER_OS-$RUNNER_ARCH"; exit 1 ;;
        esac
        echo "target=$target" >> "$GITHUB_OUTPUT"

    - name: Download relx binary
      shell: bash
      run: |
        set -euo pipefail

        version='${{ inputs.version }}'
        target='${{ steps.platform.outputs.target }}'
        repo='${{ github.action_repository || 'iamgp/ReleaseX' }}'

        if [[ "$target" == *windows* ]]; then
          archive="relx-${target}.zip"
        else
          archive="relx-${target}.tar.gz"
        fi

        if [ "$version" = "latest" ]; then
          url="https://github.com/$repo/releases/latest/download/$archive"
        else
          url="https://github.com/$repo/releases/download/$version/$archive"
        fi

        temp_dir="$(mktemp -d)"
        echo "Downloading $url"
        curl -fsSL "$url" -o "$temp_dir/$archive"

        if [[ "$archive" == *.zip ]]; then
          unzip -q "$temp_dir/$archive" -d "$temp_dir"
        else
          tar -xzf "$temp_dir/$archive" -C "$temp_dir"
        fi

        chmod +x "$temp_dir/relx" 2>/dev/null || true
        echo "$temp_dir" >> "$GITHUB_PATH"

    - name: Run relx
      shell: bash
      run: relx ${{ inputs.command }} ${{ inputs.args }}
