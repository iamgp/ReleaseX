name: Auto Release PR

on:
  push:
    branches: [beta]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autorelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Create or update release PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install relx
        uses: ReleaseX/action@v1
        with:
          command: status
          args: --help > /dev/null

      - name: Inspect release status
        id: status
        run: |
          next_version="$(relx status --json | jq -r '.next_version // empty')"
          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"
          echo "next_version=${next_version:-none}"

      - name: Create or update release PR
        if: steps.status.outputs.next_version != ''
        run: relx release pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip when no release is pending
        if: steps.status.outputs.next_version == ''
        run: echo "No releasable version bump detected on beta."
