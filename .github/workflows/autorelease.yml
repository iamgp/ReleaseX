name: Auto Release PR

on:
  push:
    branches: [beta]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autorelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Create or update release PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install relx
        uses: ReleaseX/action@v1
        with:
          command: status
          args: --help > /dev/null

      - name: Inspect release status
        id: status
        run: |
          relx status --json > relx-status.json
          python - <<'PY'
          import json
          import os

          with open("relx-status.json", "r", encoding="utf-8") as handle:
              status = json.load(handle)

          next_version = status.get("next_version") or ""
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"next_version={next_version}\n")

          print(f"next_version={next_version or 'none'}")
          PY

      - name: Create or update release PR
        if: steps.status.outputs.next_version != ''
        run: relx release pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip when no release is pending
        if: steps.status.outputs.next_version == ''
        run: echo "No releasable version bump detected on beta."
